name: Bug Report
description: Report a reproducible bug in Mediasis.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug. Please provide clear repro steps and expected behavior.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
      placeholder: The app crashes when...
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: List exact steps.
      placeholder: |
        1. Go to...
        2. Tap...
        3. Observe...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      placeholder: It should...
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      placeholder: It does...
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: Device/OS/runtime details
      placeholder: iPhone 17 Pro Max, iOS 26.2, Expo SDK 54
  - type: textarea
    id: evidence
    attributes:
      label: Logs / Screenshots
      description: Paste relevant logs and add screenshots if possible.

name: Native iOS Confidence

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 13 * * 1"
  workflow_dispatch:

concurrency:
  group: native-ios-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ios-build:
    name: ios-build
    runs-on: macos-15
    env:
      EXPO_NO_TELEMETRY: 1
      CI: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.20.0
          cache: npm

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"

      - name: Install dependencies
        run: npm ci

      - name: Install CocoaPods
        run: gem install cocoapods -v 1.16.2 --no-document

      - name: Verify CocoaPods
        run: pod --version

      - name: Install iOS pods
        run: |
          cd ios
          export LANG=en_US.UTF-8
          export LC_ALL=en_US.UTF-8
          export NODE_BINARY="$(command -v node)"
          echo "Using NODE_BINARY=$NODE_BINARY"
          pod install --repo-update

      - name: Build iOS app (simulator, unsigned)
        run: |
          xcodebuild \
            -workspace ios/app.xcworkspace \
            -scheme app \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            build
